; PlatformIO project configuration for the Pro Lab Overhead Stirrer
; Build:  pio run
; Upload: pio run -t upload
; Upload FS (LittleFS web files): pio run -t uploadfs
; OTA upload: set upload_port to http://labst.local/update (or the IP) and run pio run -t upload

[platformio]
default_envs = nodemcu
data_dir = data

[env:nodemcu]
platform = espressif8266
board = nodemcuv2
framework = arduino

; Core / SDK settings
board_build.flash_mode = dio
monitor_speed = 115200
upload_speed = 921600

; LittleFS filesystem for the web UI (size in KiB)
board_build.filesystem = littlefs
board_build.ldscript = eagle.flash.4m1m.ld

; FPU / exceptions off to keep the step ISR tight
build_flags =
    -D LED_BUILTIN=2
    -D ARDUINO_ESP8266_NODEMCU
    -D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY

lib_deps =
    ESP8266WiFi
    ESP8266mDNS
    ESP8266WebServer
    ArduinoOTA
    LittleFS
    ESPAsyncTCP
    ESPAsyncWebServer
    ArduinoJson

; Optional: enable to format LittleFS on first boot if mount fails
; build_flags = ${env.build_flags} -DFORMAT_FS_ON_FAIL
